services:
  - type: web
    name: lead-crm
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    preDeployCommand: "python manage.py migrate"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: lead-crm-db
          property: connectionString
      # After first deploy, set CSRF_TRUSTED_ORIGINS to your real URL so the
      # Django admin accepts logins, e.g. https://lead-crm-xxxx.onrender.com
      # Optional: GITHUB_TOKEN to lift the enrichment rate limit.

databases:
  - name: lead-crm-db
    plan: free
